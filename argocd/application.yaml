apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dev-handson-app
  namespace: openshift-gitops
spec:
  project: default
  source:
    repoURL: "https://github.com/YOUR_ORG/manifest-repo.git"
    targetRevision: main
    path: envs/dev
  destination:
    server: "https://kubernetes.default.svc"
    namespace: dev-handson
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
